<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test - Hệ Thống Quản Lý Lương</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-center mb-8">🧪 API Testing Dashboard</h1>
        
        <!-- Login Section -->
        <div class="max-w-md mx-auto mb-8">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">🔐 Authentication</h2>
                <button onclick="testLogin()" class="w-full bg-blue-600 text-white py-2 px-4 rounded hover:bg-blue-700">
                    Test Admin Login
                </button>
                <div id="loginResult" class="mt-4"></div>
            </div>
        </div>

        <!-- API Tests -->
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">🚀 API Endpoints Test</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button onclick="testHealth()" class="bg-green-600 text-white py-2 px-4 rounded hover:bg-green-700">
                        Test Health Check
                    </button>
                    <button onclick="testProfile()" class="bg-purple-600 text-white py-2 px-4 rounded hover:bg-purple-700">
                        Test Profile (Auth Required)
                    </button>
                    <button onclick="testPayrollList()" class="bg-orange-600 text-white py-2 px-4 rounded hover:bg-orange-700">
                        Test Payroll List (Admin)
                    </button>
                    <button onclick="testEmployeePayroll()" class="bg-indigo-600 text-white py-2 px-4 rounded hover:bg-indigo-700">
                        Test Employee Payroll
                    </button>
                </div>
                <div id="testResults" class="mt-6"></div>
            </div>
        </div>
    </div>

    <script>
        let authToken = null;

        async function testLogin() {
            const resultDiv = document.getElementById('loginResult');
            
            try {
                const response = await fetch('http://localhost:4000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123',
                        role: 'admin'
                    })
                });

                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.token;
                    resultDiv.innerHTML = `
                        <div class="bg-green-50 border border-green-200 rounded p-3">
                            <p class="text-green-800 font-semibold">✅ Login Success</p>
                            <p class="text-sm text-green-600">Token saved for authenticated requests</p>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="bg-red-50 border border-red-200 rounded p-3">
                            <p class="text-red-800 font-semibold">❌ Login Failed</p>
                            <p class="text-sm text-red-600">${data.message}</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="bg-red-50 border border-red-200 rounded p-3">
                        <p class="text-red-800 font-semibold">❌ Error</p>
                        <p class="text-sm text-red-600">${error.message}</p>
                    </div>
                `;
            }
        }

        async function testHealth() {
            addTestResult('Testing Health Check...', 'info');
            
            try {
                const response = await fetch('http://localhost:4000/api/health');
                const data = await response.json();
                
                addTestResult(`✅ Health Check: ${data.status} (Uptime: ${Math.round(data.uptime)}s)`, 'success');
            } catch (error) {
                addTestResult(`❌ Health Check Failed: ${error.message}`, 'error');
            }
        }

        async function testProfile() {
            if (!authToken) {
                addTestResult('❌ Profile Test: Please login first', 'error');
                return;
            }

            addTestResult('Testing Profile (with auth)...', 'info');
            
            try {
                const response = await fetch('http://localhost:4000/api/auth/profile', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                
                if (response.ok) {
                    addTestResult(`✅ Profile: ${data.user.fullName} (${data.user.role})`, 'success');
                } else {
                    addTestResult(`❌ Profile Failed: ${data.message}`, 'error');
                }
            } catch (error) {
                addTestResult(`❌ Profile Error: ${error.message}`, 'error');
            }
        }

        async function testPayrollList() {
            if (!authToken) {
                addTestResult('❌ Payroll List: Please login first', 'error');
                return;
            }

            addTestResult('Testing Payroll List (Admin only)...', 'info');
            
            try {
                const response = await fetch('http://localhost:4000/api/payroll', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                
                if (response.ok) {
                    addTestResult(`✅ Payroll List: ${data.data?.length || 0} records`, 'success');
                } else {
                    addTestResult(`⚠️ Payroll List: ${data.message} (Expected - no database)`, 'warning');
                }
            } catch (error) {
                addTestResult(`❌ Payroll List Error: ${error.message}`, 'error');
            }
        }

        async function testEmployeePayroll() {
            if (!authToken) {
                addTestResult('❌ Employee Payroll: Please login first', 'error');
                return;
            }

            addTestResult('Testing Employee Payroll (NV001)...', 'info');
            
            try {
                const response = await fetch('http://localhost:4000/api/payroll/NV001', {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                const data = await response.json();
                
                if (response.ok) {
                    addTestResult(`✅ Employee Payroll: Found data for NV001`, 'success');
                } else {
                    addTestResult(`⚠️ Employee Payroll: ${data.message} (Expected - no database)`, 'warning');
                }
            } catch (error) {
                addTestResult(`❌ Employee Payroll Error: ${error.message}`, 'error');
            }
        }

        function addTestResult(message, type) {
            const resultsDiv = document.getElementById('testResults');
            const colors = {
                info: 'bg-blue-50 border-blue-200 text-blue-800',
                success: 'bg-green-50 border-green-200 text-green-800',
                warning: 'bg-yellow-50 border-yellow-200 text-yellow-800',
                error: 'bg-red-50 border-red-200 text-red-800'
            };
            
            const resultElement = document.createElement('div');
            resultElement.className = `border rounded p-3 mb-2 ${colors[type]}`;
            resultElement.innerHTML = `
                <p class="text-sm font-medium">${message}</p>
                <p class="text-xs opacity-75">${new Date().toLocaleTimeString()}</p>
            `;
            
            resultsDiv.appendChild(resultElement);
            resultsDiv.scrollTop = resultsDiv.scrollHeight;
        }

        // Auto-run health check on load
        window.onload = () => {
            testHealth();
        };
    </script>
</body>
</html>

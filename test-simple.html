<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test API Simple</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
      }
      .result {
        margin: 10px 0;
        padding: 10px;
        border-radius: 5px;
      }
      .success {
        background-color: #d4edda;
        color: #155724;
      }
      .error {
        background-color: #f8d7da;
        color: #721c24;
      }
      button {
        margin: 5px;
        padding: 10px 15px;
        cursor: pointer;
      }
      pre {
        background: #f8f9fa;
        padding: 10px;
        border-radius: 5px;
        overflow-x: auto;
      }
    </style>
  </head>
  <body>
    <h1>Test API Simple</h1>
    <div id="results"></div>

    <button onclick="testAdminFlow()">Test Admin Flow</button>
    <button onclick="testEmployeeAPI()">Test Employee API</button>
    <button onclick="clearResults()">Clear Results</button>

    <script>
      const API_BASE = "http://localhost:4001/api";
      let adminToken = "";

      function addResult(message, type = "success") {
        const div = document.createElement("div");
        div.className = `result ${type}`;
        div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
        document.getElementById("results").appendChild(div);
        div.scrollIntoView({ behavior: "smooth" });
      }

      function clearResults() {
        document.getElementById("results").innerHTML = "";
      }

      async function testAdminFlow() {
        try {
          clearResults();
          addResult("🚀 Bắt đầu test admin flow...", "success");

          // Step 1: Login
          addResult("1️⃣ Testing admin login...", "success");
          const loginResponse = await fetch(`${API_BASE}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: "admin",
              password: "admin123",
              role: "admin",
            }),
          });

          const loginData = await loginResponse.json();
          if (loginResponse.ok && loginData.success) {
            adminToken = loginData.token;
            addResult(
              `✅ Login successful. Token: ${adminToken.substring(0, 20)}...`,
              "success"
            );
            addResult(
              `<pre>${JSON.stringify(loginData, null, 2)}</pre>`,
              "success"
            );
          } else {
            addResult(`❌ Login failed: ${loginData.message}`, "error");
            return;
          }

          // Step 2: Get All Payroll
          addResult("2️⃣ Testing get all payroll...", "success");
          const payrollResponse = await fetch(`${API_BASE}/payroll`, {
            headers: { Authorization: `Bearer ${adminToken}` },
          });

          const payrollData = await payrollResponse.json();
          if (payrollResponse.ok) {
            addResult(
              `✅ Get payroll successful. Found ${payrollData.data ? payrollData.data.length : 0} records`,
              "success"
            );
            addResult(
              `<pre>${JSON.stringify(payrollData, null, 2)}</pre>`,
              "success"
            );
          } else {
            addResult(`❌ Get payroll failed: ${payrollData.message}`, "error");
            addResult(
              `<pre>${JSON.stringify(payrollData, null, 2)}</pre>`,
              "error"
            );
          }

          addResult("🏁 Test completed!", "success");
        } catch (error) {
          addResult(`💥 Error: ${error.message}`, "error");
        }
      }

      async function testEmployeeAPI() {
        try {
          clearResults();
          addResult("🚀 Bắt đầu test Employee API...", "success");

          // Step 1: Login Admin
          addResult("1️⃣ Testing admin login...", "success");
          const loginResponse = await fetch(`${API_BASE}/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              username: "admin",
              password: "admin123",
              role: "admin",
            }),
          });

          const loginData = await loginResponse.json();
          if (loginResponse.ok && loginData.success) {
            adminToken = loginData.token;
            addResult(`✅ Login successful`, "success");
          } else {
            addResult(`❌ Login failed: ${loginData.message}`, "error");
            return;
          }

          // Step 2: Create Employee
          addResult("2️⃣ Testing create employee...", "success");
          const createResponse = await fetch(`${API_BASE}/employees`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${adminToken}`,
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              ma_nv: "NV001",
              ho_ten: "Nguyễn Văn An",
              cccd: "123456789012",
            }),
          });

          const createData = await createResponse.json();
          if (createResponse.ok) {
            addResult(`✅ Create employee successful`, "success");
            addResult(
              `<pre>${JSON.stringify(createData, null, 2)}</pre>`,
              "success"
            );
          } else {
            addResult(
              `❌ Create employee failed: ${createData.message}`,
              "error"
            );
            addResult(
              `<pre>${JSON.stringify(createData, null, 2)}</pre>`,
              "error"
            );
          }

          // Step 3: Get All Employees
          addResult("3️⃣ Testing get all employees...", "success");
          const employeesResponse = await fetch(`${API_BASE}/employees`, {
            headers: { Authorization: `Bearer ${adminToken}` },
          });

          const employeesData = await employeesResponse.json();
          if (employeesResponse.ok) {
            addResult(
              `✅ Get employees successful. Found ${
                employeesData.data ? employeesData.data.length : 0
              } employees`,
              "success"
            );
            addResult(
              `<pre>${JSON.stringify(employeesData, null, 2)}</pre>`,
              "success"
            );
          } else {
            addResult(
              `❌ Get employees failed: ${employeesData.message}`,
              "error"
            );
            addResult(
              `<pre>${JSON.stringify(employeesData, null, 2)}</pre>`,
              "error"
            );
          }

          addResult("🏁 Employee API test completed!", "success");
        } catch (error) {
          addResult(`💥 Error: ${error.message}`, "error");
        }
      }
    </script>
  </body>
</html>

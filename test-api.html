<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-result { margin: 10px 0; padding: 10px; border-radius: 5px; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .info { background-color: #d1ecf1; color: #0c5460; }
        button { margin: 5px; padding: 10px 15px; cursor: pointer; }
        pre { background: #f8f9fa; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>API Test Suite</h1>
    <div id="results"></div>
    
    <button onclick="testAdminLogin()">Test Admin Login</button>
    <button onclick="testEmployeeLogin()">Test Employee Login</button>
    <button onclick="testGetAllPayroll()">Test Get All Payroll (Admin)</button>
    <button onclick="testGetEmployeePayroll()">Test Get Employee Payroll</button>
    <button onclick="testUnauthorizedAccess()">Test Unauthorized Access</button>
    <button onclick="runAllTests()">Run All Tests</button>
    <button onclick="clearResults()">Clear Results</button>

    <script>
        const API_BASE = 'http://localhost:4001/api';
        let adminToken = '';
        let employeeToken = '';

        function addResult(message, type = 'info') {
            const div = document.createElement('div');
            div.className = `test-result ${type}`;
            div.innerHTML = `<strong>${new Date().toLocaleTimeString()}</strong>: ${message}`;
            document.getElementById('results').appendChild(div);
            div.scrollIntoView({ behavior: 'smooth' });
        }

        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }

        async function testAdminLogin() {
            try {
                addResult('Testing Admin Login...', 'info');
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'admin',
                        password: 'admin123',
                        role: 'admin'
                    })
                });
                
                const data = await response.json();
                if (response.ok && data.success) {
                    adminToken = data.token;
                    addResult(`✅ Admin login successful. Token: ${adminToken.substring(0, 20)}...`, 'success');
                    addResult(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                } else {
                    addResult(`❌ Admin login failed: ${data.message}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Admin login error: ${error.message}`, 'error');
            }
        }

        async function testEmployeeLogin() {
            try {
                addResult('Testing Employee Login (NV001)...', 'info');
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: 'NV001',
                        password: '123456',
                        role: 'employee'
                    })
                });
                
                const data = await response.json();
                if (response.ok && data.success) {
                    employeeToken = data.token;
                    addResult(`✅ Employee login successful. Token: ${employeeToken.substring(0, 20)}...`, 'success');
                    addResult(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                } else {
                    addResult(`❌ Employee login failed: ${data.message}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Employee login error: ${error.message}`, 'error');
            }
        }

        async function testGetAllPayroll() {
            try {
                if (!adminToken) {
                    addResult('❌ Admin token not available. Please login first.', 'error');
                    return;
                }
                
                addResult('Testing Get All Payroll (Admin only)...', 'info');
                const response = await fetch(`${API_BASE}/payroll`, {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                const data = await response.json();
                if (response.ok) {
                    addResult(`✅ Get all payroll successful. Found ${data.data ? data.data.length : 0} records`, 'success');
                    addResult(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                } else {
                    addResult(`❌ Get all payroll failed: ${data.message}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Get all payroll error: ${error.message}`, 'error');
            }
        }

        async function testGetEmployeePayroll() {
            try {
                if (!employeeToken) {
                    addResult('❌ Employee token not available. Please login first.', 'error');
                    return;
                }
                
                addResult('Testing Get Employee Payroll (NV001)...', 'info');
                const response = await fetch(`${API_BASE}/payroll/NV001`, {
                    headers: { 'Authorization': `Bearer ${employeeToken}` }
                });
                
                const data = await response.json();
                if (response.ok) {
                    addResult(`✅ Get employee payroll successful`, 'success');
                    addResult(`<pre>${JSON.stringify(data, null, 2)}</pre>`, 'info');
                } else {
                    addResult(`❌ Get employee payroll failed: ${data.message}`, 'error');
                }
            } catch (error) {
                addResult(`❌ Get employee payroll error: ${error.message}`, 'error');
            }
        }

        async function testUnauthorizedAccess() {
            try {
                addResult('Testing Unauthorized Access...', 'info');
                const response = await fetch(`${API_BASE}/payroll`);
                
                const data = await response.json();
                if (response.status === 401) {
                    addResult(`✅ Unauthorized access properly blocked: ${data.message}`, 'success');
                } else {
                    addResult(`❌ Unauthorized access not properly blocked`, 'error');
                }
            } catch (error) {
                addResult(`❌ Unauthorized access test error: ${error.message}`, 'error');
            }
        }

        async function runAllTests() {
            clearResults();
            addResult('🚀 Running all tests...', 'info');
            
            await testAdminLogin();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testEmployeeLogin();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testGetAllPayroll();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testGetEmployeePayroll();
            await new Promise(resolve => setTimeout(resolve, 500));
            
            await testUnauthorizedAccess();
            
            addResult('🏁 All tests completed!', 'success');
        }
    </script>
</body>
</html>
